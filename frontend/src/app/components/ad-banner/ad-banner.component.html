<div [ngClass]="containerClass" *ngIf="isBrowser" id="ad-banner">
  <!-- Google AdSense Placeholder -->
  <!-- Replace data-ad-client and data-ad-slot with your AdSense values -->
  <div class="ad-placeholder">
    <div class="ad-label">Advertisement</div>
    <div class="ad-content">
      <!--
        Production: Uncomment and configure with your AdSense credentials
        <ins class="adsbygoogle"
          style="display:block"
          [attr.data-ad-client]="'ca-pub-XXXXXXXXXXXXXXXX'"
          [attr.data-ad-slot]="slot"
          data-ad-format="auto"
          data-full-width-responsive="true">
        </ins>
      -->
      <span class="ad-dev-text">AdSense Banner — {{ format }}</span>
    </div>
  </div>
</div>
